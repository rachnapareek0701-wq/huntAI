<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hunt.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Spectral:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0E1410;
    --bg-1:#161D18;
    --bg-2:#1D251F;
    --line:#2B342D;
    --line-strong:#3B4A3E;
    --ink:#E9E6D8;
    --ink-dim:#9AA396;
    --ink-faint:#6B7468;
    --amber:#E8A33D;
    --amber-dim:#B87F2C;
    --ember:#C1502E;
    --font-display:'Fjalla One', sans-serif;
    --font-body:'Spectral', serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg-0);
    color:var(--ink);
    font-family:var(--font-body);
  }
  body{
    background-image:
      radial-gradient(circle at 20% 15%, rgba(232,163,61,0.05), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  }
  .app{
    max-width:760px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
  }

  /* header */
  header{
    padding:20px 24px 16px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:linear-gradient(180deg, var(--bg-1), var(--bg-0));
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .mark{ width:34px; height:34px; flex-shrink:0; }
  .brand-text h1{
    font-family:var(--font-display);
    font-weight:400;
    letter-spacing:0.5px;
    font-size:22px;
    margin:0;
    color:var(--ink);
    text-transform:lowercase;
  }
  .brand-text p{
    margin:1px 0 0;
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--ink-faint);
  }
  .status{
    display:flex; align-items:center; gap:7px;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-dim);
    letter-spacing:0.5px;
  }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 0 0 rgba(232,163,61,0.5);
    animation:pulse-dot 2.4s ease-out infinite;
  }
  .dot.error{ background:var(--ember); }
  @keyframes pulse-dot{
    0%{ box-shadow:0 0 0 0 rgba(232,163,61,0.45); }
    70%{ box-shadow:0 0 0 8px rgba(232,163,61,0); }
    100%{ box-shadow:0 0 0 0 rgba(232,163,61,0); }
  }

  /* trail markers row */
  .trail{
    display:flex;
    gap:0;
    padding:10px 24px;
    border-bottom:1px solid var(--line);
    background:var(--bg-0);
    overflow-x:auto;
  }
  .trail button{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.4px;
    color:var(--ink-faint);
    background:none;
    border:none;
    border-right:1px solid var(--line);
    padding:2px 14px;
    cursor:pointer;
    white-space:nowrap;
    transition:color 0.15s;
  }
  .trail button:first-child{ padding-left:0; }
  .trail button:last-child{ border-right:none; }
  .trail button:hover{ color:var(--amber); }

  /* messages */
  main{
    flex:1;
    padding:28px 24px 12px;
    display:flex;
    flex-direction:column;
    gap:22px;
    overflow-y:auto;
  }
  .empty{
    margin:auto;
    text-align:center;
    max-width:420px;
    color:var(--ink-faint);
  }
  .empty .glyph{ width:56px; height:56px; margin:0 auto 18px; opacity:0.7; }
  .empty h2{
    font-family:var(--font-display);
    font-weight:400;
    font-size:19px;
    color:var(--ink-dim);
    text-transform:lowercase;
    letter-spacing:0.3px;
    margin:0 0 8px;
  }
  .empty p{ font-size:14px; line-height:1.6; margin:0; }

  .msg{ display:flex; gap:14px; max-width:100%; }
  .msg .avatar{
    width:26px; height:26px; flex-shrink:0; margin-top:2px;
    display:flex; align-items:center; justify-content:center;
  }
  .msg.user{ flex-direction:row-reverse; }
  .msg.user .bubble{
    background:var(--bg-2);
    border:1px solid var(--line-strong);
    border-radius:3px 12px 12px 12px;
  }
  .msg.ai .bubble{
    background:transparent;
    border:1px solid var(--line);
    border-left:2px solid var(--amber-dim);
    border-radius:2px 10px 10px 2px;
  }
  .bubble{
    padding:12px 15px;
    font-size:15.5px;
    line-height:1.65;
    max-width:80%;
    color:var(--ink);
  }
  .bubble p{ margin:0 0 10px; }
  .bubble p:last-child{ margin-bottom:0; }
  .msg-label{
    font-family:var(--font-mono);
    font-size:9.5px;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin:0 0 5px;
  }
  .msg.user .msg-label{ text-align:right; }

  .thinking{
    display:flex; align-items:center; gap:10px;
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--ink-faint);
    letter-spacing:0.5px;
    padding:2px 0 2px 40px;
  }
  .sweep{
    width:14px; height:14px;
    border:1px solid var(--amber-dim);
    border-radius:50%;
    position:relative;
    flex-shrink:0;
  }
  .sweep::after{
    content:'';
    position:absolute; top:50%; left:50%;
    width:6px; height:1px;
    background:var(--amber);
    transform-origin:0% 50%;
    animation:sweep-spin 1.1s linear infinite;
  }
  @keyframes sweep-spin{ to{ transform:rotate(360deg); } }

  .error-line{
    display:flex; align-items:center; gap:10px;
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--ember);
    border:1px dashed var(--ember);
    padding:10px 14px;
    border-radius:2px;
    background:rgba(193,80,46,0.06);
  }
  .error-line button{
    margin-left:auto;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink);
    background:var(--bg-2);
    border:1px solid var(--line-strong);
    padding:5px 11px;
    border-radius:2px;
    cursor:pointer;
    letter-spacing:0.4px;
  }
  .error-line button:hover{ border-color:var(--amber); color:var(--amber); }

  /* composer */
  .composer{
    padding:16px 24px 22px;
    border-top:1px solid var(--line);
    background:var(--bg-0);
  }
  .composer-inner{
    display:flex;
    align-items:flex-end;
    gap:10px;
    background:var(--bg-1);
    border:1px solid var(--line-strong);
    border-radius:3px;
    padding:8px 8px 8px 16px;
  }
  .composer-inner:focus-within{ border-color:var(--amber-dim); }
  textarea{
    flex:1;
    resize:none;
    background:none;
    border:none;
    outline:none;
    color:var(--ink);
    font-family:var(--font-body);
    font-size:15px;
    line-height:1.5;
    max-height:140px;
    padding:6px 0;
  }
  textarea::placeholder{ color:var(--ink-faint); }
  .send{
    flex-shrink:0;
    width:36px; height:36px;
    border-radius:2px;
    border:1px solid var(--amber-dim);
    background:transparent;
    color:var(--amber);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background 0.15s, transform 0.1s;
  }
  .send:hover{ background:rgba(232,163,61,0.1); }
  .send:active{ transform:scale(0.94); }
  .send:disabled{ opacity:0.35; cursor:default; }
  .hint{
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--ink-faint);
    letter-spacing:0.5px;
    margin:8px 2px 0;
  }

  main::-webkit-scrollbar{ width:8px; }
  main::-webkit-scrollbar-thumb{ background:var(--line-strong); border-radius:4px; }
  main::-webkit-scrollbar-track{ background:transparent; }

  @media (max-width:600px){
    header{ padding:16px 16px 14px; }
    main{ padding:20px 16px 12px; }
    .composer{ padding:12px 16px 18px; }
    .bubble{ max-width:88%; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <svg class="mark" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="#3B4A3E" stroke-width="1"/>
        <circle cx="20" cy="20" r="11" stroke="#3B4A3E" stroke-width="1"/>
        <line x1="20" y1="1" x2="20" y2="9" stroke="#E8A33D" stroke-width="1.4"/>
        <line x1="20" y1="31" x2="20" y2="39" stroke="#3B4A3E" stroke-width="1"/>
        <line x1="1" y1="20" x2="9" y2="20" stroke="#3B4A3E" stroke-width="1"/>
        <line x1="31" y1="20" x2="39" y2="20" stroke="#3B4A3E" stroke-width="1"/>
        <circle cx="20" cy="20" r="2" fill="#E8A33D"/>
      </svg>
      <div class="brand-text">
        <h1>hunt.ai</h1>
        <p>signal tracker</p>
      </div>
    </div>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">connected</span>
    </div>
  </header>

  <div class="trail">
    <button onclick="quickSend('What can you help me track down?')">capabilities</button>
    <button onclick="quickSend('Give me a starting point for researching a topic.')">new hunt</button>
    <button onclick="clearChat()">clear trail</button>
  </div>

  <main id="messages">
    <div class="empty" id="emptyState">
      <svg class="glyph" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="16" stroke="#6B7468" stroke-width="1"/>
        <circle cx="20" cy="20" r="9" stroke="#6B7468" stroke-width="1"/>
        <circle cx="20" cy="20" r="2" fill="#E8A33D"/>
      </svg>
      <h2>nothing on the trail yet</h2>
      <p>Ask a question below and hunt.ai will track down an answer. Every reply is one message &mdash; no history is kept once you leave this page.</p>
    </div>
  </main>

  <div class="composer">
    <div class="composer-inner">
      <textarea id="input" rows="1" placeholder="What are you trying to find?" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button class="send" id="sendBtn" onclick="sendMessage()" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
    <p class="hint">enter to send &middot; shift+enter for a new line</p>
  </div>

</div>

<script>
let history = [];
let isLoading = false;

const messagesEl = document.getElementById('messages');
const emptyState = document.getElementById('emptyState');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

function quickSend(text){
  inputEl.value = text;
  sendMessage();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderBubble(role, text){
  if(emptyState) emptyState.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.innerHTML = role === 'user'
    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9AA396" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>'
    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E8A33D" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>';

  const col = document.createElement('div');
  col.style.display = 'flex';
  col.style.flexDirection = 'column';
  col.style.maxWidth = '80%';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'you' : 'hunt.ai';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const paragraphs = text.split(/\n\n+/);
  bubble.innerHTML = paragraphs.map(p => '<p>' + escapeHtml(p).replace(/\n/g, '<br>') + '</p>').join('');

  col.appendChild(label);
  col.appendChild(bubble);
  wrap.appendChild(avatar);
  wrap.appendChild(col);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function renderThinking(){
  const el = document.createElement('div');
  el.className = 'thinking';
  el.id = 'thinkingRow';
  el.innerHTML = '<span class="sweep"></span><span>tracking a response&hellip;</span>';
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeThinking(){
  const el = document.getElementById('thinkingRow');
  if(el) el.remove();
}

function renderError(message, retryText){
  removeThinking();
  const el = document.createElement('div');
  el.className = 'error-line';
  el.innerHTML = '<span>connection lost &mdash; ' + escapeHtml(message) + '</span><button id="retryBtn">retry</button>';
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  document.getElementById('retryBtn').onclick = function(){
    el.remove();
    sendToModel(retryText);
  };
  setStatus(false);
}

function setStatus(connected){
  if(connected){
    statusDot.classList.remove('error');
    statusText.textContent = 'connected';
  } else {
    statusDot.classList.add('error');
    statusText.textContent = 'connection error';
  }
}

function clearChat(){
  history = [];
  messagesEl.innerHTML = '';
  const es = document.createElement('div');
  es.className = 'empty';
  es.id = 'emptyState';
  es.innerHTML = document.getElementById('emptyState') ? '' : '';
  es.innerHTML = '<svg class="glyph" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="16" stroke="#6B7468" stroke-width="1"/><circle cx="20" cy="20" r="9" stroke="#6B7468" stroke-width="1"/><circle cx="20" cy="20" r="2" fill="#E8A33D"/></svg><h2>nothing on the trail yet</h2><p>Ask a question below and hunt.ai will track down an answer. Every reply is one message &mdash; no history is kept once you leave this page.</p>';
  messagesEl.appendChild(es);
  setStatus(true);
}

async function sendMessage(){
  const text = inputEl.value.trim();
  if(!text || isLoading) return;
  inputEl.value = '';
  autoGrow(inputEl);
  renderBubble('user', text);
  history.push({ role: 'user', content: text });
  await sendToModel(text);
}

async function sendToModel(lastUserText){
  isLoading = true;
  sendBtn.disabled = true;
  renderThinking();

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: "You are hunt.ai, a focused research and discovery assistant. Keep replies clear, direct, and useful. You have a slight tracker/field-guide personality but never overdo it \u2014 substance first.",
        messages: history
      })
    });

    if(!response.ok){
      throw new Error('server responded ' + response.status);
    }

    const data = await response.json();
    const textBlock = (data.content || []).find(b => b.type === 'text');
    const replyText = textBlock ? textBlock.text : "No response text came back.";

    removeThinking();
    renderBubble('ai', replyText);
    history.push({ role: 'assistant', content: replyText });
    setStatus(true);

  } catch(err){
    renderError(err.message || 'unknown error', lastUserText);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
  }
}
</script>
</body>
</html>
