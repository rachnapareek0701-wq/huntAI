<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>huntAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0d0c;
    --panel: #14181a;
    --panel-raised: #1b2124;
    --line: #262d2f;
    --text: #edeae2;
    --text-dim: #8b9088;
    --amber: #e8a33d;
    --amber-dim: #7a5a24;
    --sage: #6b7860;
    --danger: #c25b4a;
    --radius: 3px;
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(107,120,96,0.08), transparent 45%),
      radial-gradient(circle at 85% 100%, rgba(232,163,61,0.06), transparent 40%),
      var(--bg);
    color: var(--text);
    font-family:'Inter', sans-serif;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing: antialiased;
  }
  .app{
    width:100%;
    max-width: 820px;
    height:100vh;
    display:flex;
    flex-direction:column;
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
  }

  /* ---- Header ---- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 24px;
    border-bottom:1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .mark{ width:30px; height:30px; position:relative; flex-shrink:0; }
  .mark svg{ width:100%; height:100%; display:block; }
  .mark circle{ stroke: var(--amber); }
  .mark line{ stroke: var(--amber); }
  .mark .pulse{
    transform-origin: 15px 15px;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:0.25; transform: scale(0.7); }
    50%{ opacity:1; transform: scale(1); }
  }
  .brand h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:19px;
    letter-spacing:0.02em;
    margin:0;
  }
  .brand h1 span{ color: var(--amber); }
  .brand .tagline{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color: var(--text-dim);
    letter-spacing:0.12em;
    text-transform:uppercase;
    margin-top:2px;
  }
  .status{
    display:flex; align-items:center; gap:7px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    color: var(--text-dim);
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .status .dot{
    width:6px; height:6px; border-radius:50%;
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
  }

  /* ---- Messages ---- */
  .thread{
    flex:1;
    overflow-y:auto;
    padding: 28px 24px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }
  .thread::-webkit-scrollbar{ width:8px; }
  .thread::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 4px; }

  .row{ display:flex; gap:12px; max-width: 100%; }
  .row.user{ flex-direction:row-reverse; }
  .avatar{
    width:28px; height:28px; border-radius:50%;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    margin-top:2px;
  }
  .row.assistant .avatar{
    border: 1px solid var(--amber-dim);
    color: var(--amber);
    background: var(--panel-raised);
  }
  .row.user .avatar{
    border: 1px solid var(--line);
    color: var(--text-dim);
    background: var(--panel-raised);
  }
  .bubble{
    padding: 12px 15px;
    border-radius: var(--radius);
    font-size:14.5px;
    line-height:1.55;
    max-width: 78%;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .row.assistant .bubble{
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 2px solid var(--amber-dim);
  }
  .row.user .bubble{
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--text);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:9.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color: var(--text-dim);
    margin-bottom:5px;
  }

  /* Radar tracking indicator */
  .radar{
    width:16px; height:16px; position:relative;
  }
  .radar svg{ width:100%; height:100%; }
  .radar .sweep{
    transform-origin: 8px 8px;
    animation: spin 1.1s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .empty{
    margin:auto;
    text-align:center;
    color: var(--text-dim);
    max-width: 380px;
  }
  .empty .mark{ width:44px; height:44px; margin:0 auto 18px; }
  .empty h2{
    font-family:'Space Grotesk', sans-serif;
    color: var(--text);
    font-size:18px;
    font-weight:600;
    margin: 0 0 8px;
  }
  .empty p{ font-size:13px; line-height:1.6; margin:0; }
  .suggestions{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:20px;
  }
  .chip{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    padding:7px 12px;
    border:1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text-dim);
    cursor:pointer;
    transition: border-color .15s, color .15s;
    background:transparent;
  }
  .chip:hover{ border-color: var(--amber-dim); color: var(--amber); }

  /* ---- Composer ---- */
  .composer{
    border-top:1px solid var(--line);
    padding: 16px 24px 20px;
    background: linear-gradient(0deg, rgba(255,255,255,0.02), transparent);
  }
  .input-wrap{
    display:flex;
    align-items:flex-end;
    gap:10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 10px 10px 14px;
    transition: border-color .15s;
  }
  .input-wrap:focus-within{ border-color: var(--amber-dim); }
  textarea{
    flex:1;
    resize:none;
    border:none;
    outline:none;
    background:transparent;
    color: var(--text);
    font-family:'Inter', sans-serif;
    font-size:14.5px;
    line-height:1.5;
    max-height: 160px;
    padding: 6px 0;
  }
  textarea::placeholder{ color: var(--text-dim); }
  .send{
    width:34px; height:34px;
    border-radius: var(--radius);
    border:1px solid var(--amber-dim);
    background: var(--amber);
    color: #17140c;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition: opacity .15s, transform .1s;
  }
  .send:hover{ opacity:0.9; }
  .send:active{ transform: scale(0.94); }
  .send:disabled{ opacity:0.35; cursor:not-allowed; }
  .hint{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color: var(--text-dim);
    margin-top:8px;
    letter-spacing:0.04em;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="mark">
        <svg viewBox="0 0 30 30" fill="none">
          <circle cx="15" cy="15" r="13" stroke-width="1"/>
          <circle class="pulse" cx="15" cy="15" r="7" stroke-width="1"/>
          <line x1="15" y1="1" x2="15" y2="7" stroke-width="1.4"/>
          <line x1="15" y1="23" x2="15" y2="29" stroke-width="1.4"/>
          <line x1="1" y1="15" x2="7" y2="15" stroke-width="1.4"/>
          <line x1="23" y1="15" x2="29" y2="15" stroke-width="1.4"/>
          <circle cx="15" cy="15" r="1.6" fill="#e8a33d" stroke="none"/>
        </svg>
      </div>
      <div>
        <h1>hunt<span>AI</span></h1>
        <div class="tagline">track · target · resolve</div>
      </div>
    </div>
    <div class="status"><span class="dot"></span> online</div>
  </header>

  <div class="thread" id="thread">
    <div class="empty" id="empty">
      <div class="mark">
        <svg viewBox="0 0 30 30" fill="none">
          <circle cx="15" cy="15" r="13" stroke="#e8a33d" stroke-width="1"/>
          <circle cx="15" cy="15" r="7" stroke="#e8a33d" stroke-width="1"/>
          <line x1="15" y1="1" x2="15" y2="7" stroke="#e8a33d" stroke-width="1.4"/>
          <line x1="15" y1="23" x2="15" y2="29" stroke="#e8a33d" stroke-width="1.4"/>
          <line x1="1" y1="15" x2="7" y2="15" stroke="#e8a33d" stroke-width="1.4"/>
          <line x1="23" y1="15" x2="29" y2="15" stroke="#e8a33d" stroke-width="1.4"/>
          <circle cx="15" cy="15" r="1.6" fill="#e8a33d" stroke="none"/>
        </svg>
      </div>
      <h2>What are you hunting for?</h2>
      <p>Ask a question, chase down a problem, or hand off something you need untangled. huntAI stays locked on until it's resolved.</p>
      <div class="suggestions">
        <button class="chip" onclick="quickSend(this)">Break down a hard decision</button>
        <button class="chip" onclick="quickSend(this)">Debug my reasoning</button>
        <button class="chip" onclick="quickSend(this)">Find the flaw in this plan</button>
      </div>
    </div>
  </div>

  <div class="composer">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Message huntAI..."></textarea>
      <button class="send" id="sendBtn" onclick="sendMessage()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for a new line</div>
  </div>

</div>

<script>
  const thread = document.getElementById('thread');
  const empty = document.getElementById('empty');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  
  let history = [];
  let busy = false;

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  function quickSend(el){
    input.value = el.textContent;
    sendMessage();
  }

  function addMessage(role, text){
    if(empty && empty.parentNode){ empty.remove(); }
    const row = document.createElement('div');
    row.className = 'row ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'YOU' : '';
    if(role === 'assistant'){
      avatar.innerHTML = `<svg viewBox="0 0 16 16" width="14" height="14" fill="none">
        <circle cx="8" cy="8" r="6.2" stroke="#e8a33d" stroke-width="1"/>
        <circle cx="8" cy="8" r="1.4" fill="#e8a33d"/>
      </svg>`;
    }

    const bubbleWrap = document.createElement('div');
    const eyebrow = document.createElement('div');
    eyebrow.className = 'eyebrow';
    eyebrow.textContent = role === 'user' ? 'you' : 'huntAI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    bubbleWrap.appendChild(eyebrow);
    bubbleWrap.appendChild(bubble);
    row.appendChild(avatar);
    row.appendChild(bubbleWrap);
    thread.appendChild(row);
    thread.scrollTop = thread.scrollHeight;
    return bubble;
  }

  function addThinking(){
    const row = document.createElement('div');
    row.className = 'row assistant';
    row.id = 'thinkingRow';
    row.innerHTML = `
      <div class="avatar">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none">
          <circle cx="8" cy="8" r="6.2" stroke="#e8a33d" stroke-width="1"/>
          <circle cx="8" cy="8" r="1.4" fill="#e8a33d"/>
        </svg>
      </div>
      <div>
        <div class="eyebrow">huntAI · tracking</div>
        <div class="radar">
          <svg viewBox="0 0 16 16">
            <circle cx="8" cy="8" r="6.5" stroke="#262d2f" stroke-width="1" fill="none"/>
            <line class="sweep" x1="8" y1="8" x2="8" y2="1.8" stroke="#e8a33d" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>`;
    thread.appendChild(row);
    thread.scrollTop = thread.scrollHeight;
  }

  function removeThinking(){
    const el = document.getElementById('thinkingRow');
    if(el) el.remove();
  }

  async function sendMessage(){
    const text = input.value.trim();
    if(!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    history.push({ role: 'user', parts: [{ text: text }] });
    addThinking();

    try{
      // Pulling the API Key securely from Vercel's injected environment processes
      const apiKey = process.env.GEMINI_API_KEY || window.GEMINI_API_KEY;
      
      if(!apiKey) {
        removeThinking();
        addMessage('assistant', "API Key configuration missing on Vercel environment settings.");
        busy = false;
        sendBtn.disabled = false;
        return;
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: history,
          systemInstruction: {
            parts: [{ text: "You are huntAI, a sharp, focused AI assistant. You help people track down answers, debug problems, and cut through noise. Keep a confident, precise, no-fluff tone without being curt." }]
          }
        })
      });
      
      const data = await response.json();
      removeThinking();

      let replyText = "Something went wrong on the signal — try again.";
      
      if(data && data.candidates && data.candidates[0].content && data.candidates[0].content.parts){
        replyText = data.candidates[0].content.parts[0].text;
      } else if (data.error) {
        replyText = "API Error: " + data.error.message;
      }
      
      addMessage('assistant', replyText);
      history.push({ role: 'model', parts: [{ text: replyText }] });
    }catch(err){
      removeThinking();
      addMessage('assistant', "Lost the signal — connection error. Try again.");
      console.error(err);
    }

    busy = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
