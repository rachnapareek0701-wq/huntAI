<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>huntAI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

background:#050816;
overflow:hidden;
color:white;

}

body::before{

content:'';
position:fixed;

width:800px;
height:800px;

background:#00ffff33;

filter:blur(200px);

left:-300px;
top:-300px;

z-index:-10;

}

body::after{

content:'';

position:fixed;

width:800px;
height:800px;

background:#0066ff44;

filter:blur(220px);

right:-300px;
bottom:-300px;

z-index:-10;

}

.sidebar{

position:fixed;

left:0;
top:0;

width:90px;
height:100vh;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border-right:1px solid rgba(255,255,255,.1);

display:flex;

flex-direction:column;

align-items:center;

padding-top:30px;

}

.logo{

font-size:30px;

font-weight:bold;

color:#00ffff;

text-shadow:0 0 20px cyan;

margin-bottom:50px;

}

.icon{

width:60px;
height:60px;

margin-bottom:25px;

border-radius:20px;

display:flex;

justify-content:center;
align-items:center;

background:rgba(255,255,255,.05);

cursor:pointer;

transition:.4s;

}

.icon:hover{

background:#00ffff33;

transform:translateY(-5px);

box-shadow:0 0 25px cyan;

}

.main{

margin-left:90px;

height:100vh;

display:flex;

flex-direction:column;

}

.topbar{

height:80px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 40px;

background:rgba(255,255,255,.04);

backdrop-filter:blur(15px);

border-bottom:1px solid rgba(255,255,255,.1);

}

.title{

font-size:28px;

color:#00ffff;

}

.status{

padding:10px 20px;

border-radius:40px;

background:#00ff8840;

color:#00ff88;

}

.chat{

flex:1;

padding:30px;

overflow:auto;

}

.message{

max-width:700px;

margin-bottom:25px;

padding:20px;

border-radius:20px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.08);

animation:fade .5s;

}

.ai{

border-left:5px solid cyan;

}

.user{

margin-left:auto;

border-left:5px solid #00ff88;

}

.inputArea{

height:100px;

display:flex;

padding:20px;

background:rgba(255,255,255,.04);

backdrop-filter:blur(15px);

}

input{

flex:1;

border:none;

outline:none;

background:#10182d;

color:white;

padding:18px;

font-size:18px;

border-radius:15px;

}

button{

width:170px;

margin-left:15px;

border:none;

background:linear-gradient(90deg,#00ffff,#0066ff);

color:white;

font-size:18px;

border-radius:15px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 25px cyan;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0px);

}

}

.matrix{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;

opacity:.08;

background-image:

linear-gradient(#00ff0044 1px,transparent 1px),

linear-gradient(90deg,#00ff0044 1px,transparent 1px);

background-size:35px 35px;

animation:grid 12s linear infinite;

}

@keyframes grid{

from{

transform:translateY(0);

}

to{

transform:translateY(35px);

}

}

</style>

</head>

<body>

<div class="matrix"></div>

<div class="sidebar">

<div class="logo">H</div>

<div class="icon">ðŸ </div>

<div class="icon">ðŸŽ¤</div>

<div class="icon">ðŸ“‚</div>

<div class="icon">âš™ï¸</div>

</div>

<div class="main">

<div class="topbar">

<div class="title">

huntAI Neural System

</div>

<div class="status">

ONLINE

</div>

</div>

<div class="chat" id="chat">

<div class="message ai">

ðŸ‘‹ Welcome to huntAI.

Your futuristic AI assistant is initializing...

</div>

</div>

<input

id="msg"

placeholder="Ask huntAI anything...">

<script src="script.js"></script>
</body>
</html>
